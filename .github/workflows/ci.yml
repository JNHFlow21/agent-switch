name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade build
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: PYTHONPATH=src python -m unittest discover -s tests/integration -v
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: agent-switch --version

  macos-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: swift build --package-path macos-app/AgentSwitch
      - run: >-
          xcodebuild
          -project macos-app/AgentSwitch/AgentSwitch.xcodeproj
          -scheme AgentSwitch
          -configuration Release
          -derivedDataPath "$RUNNER_TEMP/AgentSwitchDerivedData"
          CODE_SIGNING_ALLOWED=NO
          build

  privacy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Reject common credential and private-path shapes
        run: python3 scripts/privacy_scan.py

  installer:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: zsh -n scripts/install.sh
      - run: test -x scripts/install.sh
      - run: zsh -n scripts/build-release.sh
      - run: test -x scripts/build-release.sh
